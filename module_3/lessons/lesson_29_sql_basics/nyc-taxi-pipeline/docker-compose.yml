services:

  # ── PostgreSQL (aggregated tables only) ─────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:      nyc_taxi
      POSTGRES_USER:     taxi
      POSTGRES_PASSWORD: taxi_secret
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taxi -d nyc_taxi"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Neo4j (GDS plugin required for graph algorithms) ────────────────────────
  neo4j:
    image: neo4j:5.18-community
    environment:
      NEO4J_AUTH:                                    neo4j/neo4j_secret
      NEO4J_PLUGINS:                                 '["graph-data-science"]'
      NEO4J_dbms_security_procedures_unrestricted:   "gds.*"
      NEO4J_server_memory_heap_initial__size:        512m
      NEO4J_server_memory_heap_max__size:            2G
    ports:
      - "7475:7474"   # Browser  (7474 already in use on host)
      - "7688:7687"   # Bolt     (7687 already in use on host)
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7474"]
      interval: 15s
      timeout: 10s
      retries: 8

  # ── FastAPI backend ───────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      POSTGRES_HOST:     postgres
      POSTGRES_PORT:     5432
      POSTGRES_DB:       nyc_taxi
      POSTGRES_USER:     taxi
      POSTGRES_PASSWORD: taxi_secret
      NEO4J_URI:         bolt://neo4j:7687
      NEO4J_USER:        neo4j
      NEO4J_PASSWORD:    neo4j_secret
      PARQUET_GLOB:      /app/data/**/*.parquet
    volumes:
      - ../data:/app/data:ro
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy

  # ── Dash dashboard ────────────────────────────────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dash
    environment:
      API_BASE: http://api:8000/api
    ports:
      - "8051:8050"
    depends_on:
      - api

volumes:
  pg_data:
  neo4j_data:
